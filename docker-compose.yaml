services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    ports:
      - 5453:5432
    volumes:
      - postgres_data:/var/lib/postgresql

  jaeger:
    image: jaegertracing/jaeger:latest
    ports:
      - 16686:16686
      - 9411:9411
      - 4317:4317
      - 4318:4318
      - 5778:5778
    environment:
      COLLECTOR_OTLP_ENABLED: ${COLLECTOR_OTLP_ENABLED:-true}
      COLLECTOR_OTLP_GRPC_HOST_PORT: 0.0.0.0:4317
      COLLECTOR_OTLP_HTTP_HOST_PORT: 0.0.0.0:4318
    networks:
      - monitoring

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: rendermesh
      MINIO_ROOT_PASSWORD: rendermesh-secret
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until mc alias set local http://minio:9000 rendermesh rendermesh-secret; do sleep 1; done &&
      mc mb --ignore-existing local/rendermesh-local &&
      mc mirror --overwrite /seed local/rendermesh-local"
    volumes:
      - ./examples/local/bucket:/seed:ro

  edge-api:
    image: node:22-alpine
    working_dir: /app
    command: ["node", "server.mjs"]
    ports:
      - 4010:4010
    volumes:
      - ./examples/local/edge-api:/app:ro
volumes:
  postgres_data:
  jaeger_data:
  minio_data:

networks:
  monitoring:
    driver: bridge
