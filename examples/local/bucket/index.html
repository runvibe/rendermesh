<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #101820;
        color: #f6f8f5;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 72px 24px;
      }

      a {
        color: #8bd3dd;
      }

      .panel {
        border: 1px solid #2b3a42;
        border-radius: 8px;
        padding: 24px;
        background: #16242d;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="panel">
        <p>{{eyebrow}}</p>
        <h1>{{title}}</h1>
        <p>{{message}}</p>
        <p>Edge mode: {{mode}}</p>
        <p>
          Try <a href="/static.html">static.html</a>,
          <a href="/docs">/docs</a>,
          <a href="/direct">/direct</a>, and
          <a href="/legacy">/legacy</a>.
        </p>
      </div>
    </main>
  </body>
</html>
